name: "Build and Push Docker Image"
description: "Build Docker image and push to ECR with commit SHA and latest tags"
inputs:
  image-name:
    description: "Name of the Docker image (without registry prefix)"
    required: true
  dockerfile-path:
    description: "Path to the Dockerfile"
    required: true
  build-context:
    description: "Docker build context path"
    default: "."
  build-args:
    description: "Additional docker build arguments"
    default: ""
runs:
  using: "composite"
  steps:
    - name: Build Docker image
      shell: bash
      run: |
        echo "Building ${{ inputs.image-name }} from ${{ inputs.dockerfile-path }}"

        docker build \
          -t "${{ inputs.image-name }}:latest" \
          -f "${{ inputs.dockerfile-path }}" \
          ${{ inputs.build-args }} \
          ${{ inputs.build-context }}

    - name: Push image to ECR
      shell: bash
      run: |
        # Used for sorting newest builds in flux image scanning
        TIMESTAMP=$(date +%s)
        SHORT_SHA="$(git rev-parse --short ${{ github.sha }})"
        LOCAL_TAG=${{ inputs.image-name }}:latest
        BUILD_TAG="$SHORT_SHA-$TIMESTAMP"
        ECR_IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com/${{ inputs.image-name }}"

        docker tag $LOCAL_TAG "$ECR_IMAGE:$BUILD_TAG"
        docker tag $LOCAL_TAG "$ECR_IMAGE:latest"

        docker push "$ECR_IMAGE:$BUILD_TAG"
        docker push "$ECR_IMAGE:latest"
